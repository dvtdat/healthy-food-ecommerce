info:
  title: Healthy Food E-Commerce API
  description: Healthy Food E-Commerce API description
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CreateUserDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        password:
          type: string
          example: password123
          minLength: 6
      required:
        - email
        - firstName
        - lastName
        - password
    User:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        createdAt:
          type: object
        updatedAt:
          type: object
        deletedAt:
          format: date-time
          type: string
        email:
          type: string
          example: user@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        role:
          type: string
          enum:
            - guest
            - user
            - admin
          example: user
        isActive:
          type: object
          example: true
      required:
        - _id
        - createdAt
        - updatedAt
        - email
        - firstName
        - lastName
        - role
        - isActive
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        password:
          type: string
          example: newpassword123
          minLength: 6
        role:
          type: string
          enum:
            - guest
            - user
            - admin
    UpdateUserStatusDto:
      type: object
      properties:
        isActive:
          type: boolean
          example: true
      required:
        - isActive
    CreateCategoryDto:
      type: object
      properties:
        name:
          type: string
          example: Vegetables
        slug:
          type: string
          example: vegetables
        description:
          type: string
          example: Fresh organic vegetables
        imageUrl:
          type: string
          example: https://example.com/image.jpg
      required:
        - name
        - slug
    Category:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        createdAt:
          type: object
        updatedAt:
          type: object
        deletedAt:
          format: date-time
          type: string
        name:
          type: string
          example: Vegetables
        slug:
          type: string
          example: vegetables
        description:
          type: string
          example: Fresh organic vegetables
        imageUrl:
          type: string
          example: https://example.com/image.jpg
      required:
        - _id
        - createdAt
        - updatedAt
        - name
        - slug
    UpdateCategoryDto:
      type: object
      properties:
        name:
          type: string
          example: Vegetables
        slug:
          type: string
          example: vegetables
        description:
          type: string
          example: Fresh organic vegetables
        imageUrl:
          type: string
          example: https://example.com/image.jpg
    CreateProductDto:
      type: object
      properties:
        name:
          type: string
          example: Organic Broccoli
        slug:
          type: string
          example: organic-broccoli
        description:
          type: string
          example: Fresh organic broccoli from local farms
        price:
          type: number
          example: 29000
          minimum: 0
        stock:
          type: number
          example: 100
          minimum: 0
        imageUrl:
          type: string
          example: https://example.com/broccoli.jpg
        categoryId:
          type: string
          example: 507f1f77bcf86cd799439011
      required:
        - name
        - slug
